# =============================================================================
# EcoAlerter IMGW \u2014 Konfiguracja aplikacji
# =============================================================================
# Plik ten jest wbudowan\u0105 kopi\u0105 domy\u015Blnych ustawie\u0144 (classpath).
# Aby nadpisa\u0107 warto\u015Bci, skopiuj plik do katalogu roboczego aplikacji
# lub podaj \u015Bcie\u017Ck\u0119 argumentem: java -jar eco-alerter.jar --config /\u015Bcie\u017Cka
# =============================================================================


# -----------------------------------------------------------------------------
# PERSYSTENCJA DANYCH
# -----------------------------------------------------------------------------

# Tryb zapisu danych: FILE lub DATABASE
# FILE     \u2014 zapis do plików JSON lub CSV w katalogu storage.file.dir
# DATABASE \u2014 zapis do bazy danych przez JDBC (wymaga konfiguracji sekcji DB)
persistence.mode=FILE

# --- Tryb plikowy (aktywny gdy persistence.mode=FILE) ---

# Format zapisu: JSON lub CSV
storage.file.format=JSON

# Katalog docelowy (\u015Bcie\u017Cka wzgl\u0119dna wobec katalogu roboczego lub bezwzgl\u0119dna)
storage.file.dir=./data


# --- Baza danych (aktywna gdy persistence.mode=DATABASE) ---

# JDBC URL \u2014 domy\u015Blnie SQLite (plik lokalny, bez serwera)
# PostgreSQL: jdbc:postgresql://localhost:5432/ecoalerter
# MySQL:      jdbc:mysql://localhost:3306/ecoalerter
db.url=jdbc:sqlite:./data/ecoalerter.db

# Dane logowania (puste dla SQLite)
db.user=
db.password=

# Maksymalna liczba po\u0142\u0105cze\u0144 w puli HikariCP
db.pool.max=5

# Timeout oczekiwania na po\u0142\u0105czenie z puli [ms]
db.connection.timeout.ms=30000


# -----------------------------------------------------------------------------
# KOMUNIKACJA Z API IMGW
# -----------------------------------------------------------------------------

# Bazowy URL REST API IMGW-PIB (nie zmienia\u0107 bez potrzeby)
api.imgw.base.url=https://danepubliczne.imgw.pl/api/data

# Maksymalny czas oczekiwania na odpowied\u017A HTTP [sekundy]
api.timeout.seconds=10

# Liczba prób ponowienia \u017C\u0105dania przy b\u0142\u0119dach przej\u015Bciowych (429, 5xx, sie\u0107)
api.retry.count=3


# -----------------------------------------------------------------------------
# HARMONOGRAM ZADA\u0143 (SCHEDULER)
# -----------------------------------------------------------------------------

# Domy\u015Blny interwa\u0142 odpytywania API dla ka\u017Cdej nowej stacji [sekundy]
# Warto\u015B\u0107 mo\u017Ce by\u0107 nadpisana per stacja w interfejsie graficznym
# Minimum: 60 (cz\u0119stsze odpytywanie narusza regulamin API IMGW)
scheduler.default.interval.seconds=300

# Maksymalna liczba w\u0105tków roboczych w puli schedulera
scheduler.thread.pool.size=4


# -----------------------------------------------------------------------------
# ZAKRES MONITOROWANYCH DANYCH
# -----------------------------------------------------------------------------

# W\u0142\u0105cz/wy\u0142\u0105cz ca\u0142e kategorie danych
data.meteo.enabled=true
data.hydro.enabled=true

# Pola danych meteorologicznych
data.meteo.temperature=true
data.meteo.wind=true
data.meteo.precipitation=true

# Pola danych hydrologicznych
data.hydro.waterLevel=true
data.hydro.waterTemperature=true


# -----------------------------------------------------------------------------
# OSTRZE\u017BENIA (WARNINGS)
# -----------------------------------------------------------------------------

# W\u0142\u0105cz pobieranie ostrze\u017Ce\u0144 pogodowych i hydrologicznych
warnings.enabled=true

# Minimalny poziom alertu do wy\u015Bwietlenia i zapisu: YELLOW, ORANGE, RED
# YELLOW  \u2014 ostrze\u017Cenia 1. stopnia i wy\u017Csze (wszystkie)
# ORANGE  \u2014 ostrze\u017Cenia 2. stopnia i wy\u017Csze
# RED     \u2014 tylko ostrze\u017Cenia 3. stopnia (najbardziej krytyczne)
warnings.filter.level=YELLOW

# Interwa\u0142 od\u015Bwie\u017Cania ostrze\u017Ce\u0144 [sekundy] (niezale\u017Cny od interwa\u0142u stacji)
warnings.refresh.interval.seconds=600


# -----------------------------------------------------------------------------
# LOGOWANIE
# -----------------------------------------------------------------------------

# Poziom logów: TRACE, DEBUG, INFO, WARN, ERROR
# Nadpisuje poziom Root w log4j2.xml (o ile AppLogger go respektuje)
log.level=INFO

# Czy zapisywa\u0107 logi do pliku (true/false)
log.file.enabled=true

# Katalog plików logów
log.file.dir=./logs


# -----------------------------------------------------------------------------
# INTERFEJS GRAFICZNY (GUI)
# -----------------------------------------------------------------------------

# Motyw wygl\u0105du: system, nimbus, metal, gtk (dost\u0119pno\u015B\u0107 zale\u017Cy od platformy)
gui.look.and.feel=nimbus

# Szeroko\u015B\u0107 i wysoko\u015B\u0107 okna g\u0142ównego przy starcie [px]
gui.window.width=1280
gui.window.height=800

# Czy zapami\u0119ta\u0107 rozmiar i pozycj\u0119 okna mi\u0119dzy sesjami
gui.window.remember.size=true

# Interwa\u0142 od\u015Bwie\u017Cania danych w GUI [sekundy]
gui.refresh.interval.seconds=30